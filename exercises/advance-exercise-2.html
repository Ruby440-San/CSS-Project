<!DOCTYPE html>
<html>
  <head>
    <title>CSS Advance Exercise-2</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <style>
      img{
        width: 200px;
        height: 200px;
        position: relative;

        animation: Land 4s linear 1s 2 normal;
      }

      @keyframes Land{
        0%{
          left: 0;
          top: 0;
        }
        25%{
          left: 400px;
          top: 0;
          border: 5px solid rgb(104, 75, 75);
          border-radius: 20%;
        }
        50%{
          left: 400px;
          top: 400px;
          border:5px solid rgb(19, 86, 19);
          border-radius: 30%;
        }
        75%{
          left: 0;
          top: 400px;
          border: 5px solid rgb(25, 25, 88);
          border-radius: 50%;
        }
        100%{
          left: 0;
          top: 0;
        }
      }
    </style>
  </head>
  <body>
    <img src="../Images/land4.jpg" alt="Land">
  </body>
</html>
