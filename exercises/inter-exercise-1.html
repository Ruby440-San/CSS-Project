<!DOCTYPE html>
<html>
  <head>
    <title>CSS Inter Exercise -1</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <style>
      .container{
        border: 3px solid gray;
        width: 600px;
        margin: auto;
      }
      .menu-item{
        display: inline-block;
        background-color: rgb(89, 89, 223);
        width: 140px;
        height: 40px;
        line-height: 40px;
        text-align: center;
        /* padding: 20px 50px; */
        margin: 3px;
      }
      .photo-item{
        border: 3px solid black;
        width: 200px;
        height: 150px;
        display: block;
        margin:5px auto;
      }
      hr{
        border: 2px solid black;
      }
      .image-item{
        width: 180px;
        height: 120px;
        border: 3px solid black;
        margin-left: 10px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="menu-item">Home</div>
      <div class="menu-item">About</div>
      <div class="menu-item">Services</div>
      <div class="menu-item">Contact</div>
      <img src="../Images/land.jpg" alt="Land" class="photo-item">
      <img src="../Images/land7.jpg" alt="Land" class="photo-item"><hr>
      <img src="../Images/land4.jpg" alt="Land" class="image-item">
      <img src="../Images/land5.jpg" alt="Land" class="image-item">
      <img src="../Images/land6.jpg" alt="Land" class="image-item">


    </div>
  </body>
</html>
