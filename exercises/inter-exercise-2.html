<!DOCTYPE html>
<html>
  <head>
    <title>CSS Inter Exercise -2</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <style>
      .box{
        width: 600px;
        height: 450px;
        border: 3px solid black;
        margin: auto;
        position: relative;
      }
      .top-left{
        position: absolute;
        top: 5px;
        left: 10px;
      }
      .top-right{
        position: absolute;
        top:5px;
        right: 10px;
      }
      .bottom-left{
        position: absolute;
        bottom:5px;
        left: 10px;
      }
      .bottom-right{
        position: absolute;
        bottom: 5px;
        right: 10px;
      }
      .center{
        position: absolute;
        top: 220px;
        left: 260px;
      }
      img{
        width: 100%;
        height: 450px;

      }
    </style>
  </head>
  <body>
    <div class="box"> 
      <img src="../Images/land5.jpg" alt="Land">
      <div class="top-left">top left</div>
      <div class="top-right">top right</div>
      <div class="center">center</div>
      <div class="bottom-left">bottom left</div>
      <div class="bottom-right">bottom right</div>
    </div>
  </body>
</html>
