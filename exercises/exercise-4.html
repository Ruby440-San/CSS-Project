<!DOCTYPE html>
<html>
  <head>
    <title>CSS Exercise</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <style>
      #ul-style{
        list-style-type: none;
        width: 500px;
      }
      #ul-style li{
        border: 1px solid black;
        padding: 10px;
      }
      #ul-fruit {
        background-color: #CCD1D1;
        list-style-type: none;
        width: 492px;
        padding:0;
        margin-left: 40px;
        border-left: 10px solid orange;
      }
      #ul-fruit li{
        padding: 10px 20px;
      }
      #ul-friit ,#title{
        border-bottom: 3px solid green;
      }
    </style> 
  </head>
  <body>
    <h1>Exercise-4</h1>
      <ul id="ul-style">
      <li>Jhon</li>
      <li>Sara</li>
      <li>Jenifer</li>
    </ul><hr>
    <ul id="ul-fruit">
      <li id="title">Fruit Collection</li>
      <li>Apple</li>
      <li>Orange</li>
      <li>Mango</li>
    </ul>
    

  </body>
</html>
