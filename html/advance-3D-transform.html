<!DOCTYPE html>
<html>
  <head>
    <title>CSS Advance 3D Transforms</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">\
    <style>
      div{
        width: 100px;
        height: 100px;
        background-color: rgb(148, 148, 60);
        text-align: center;
        line-height: 100px;
        margin: 5px;
      }
      div:last-of-type:hover{
        /* transform: rotateX(70deg); */
        transform: rotateY(70deg);
        /* transform: rotateZ(70deg); */
      }
    </style>
  </head>
  <body>
    <div>Ruby</div>
    <div>Ki Ki</div>
  </body>
</html>
