<!DOCTYPE html>
<html>
  <head>
    <title>CSS Advance Transitions</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <style>
      img{
        width: 250px;
        height: 250px;
        display: block;
        margin: 5px auto;

        transition: 1s ease-in-out;
      }
      img:hover{
        width: 300px;
        height: 300px;
        border-radius: 50%;

      }
      div{
        width: 100px;
        height: 100px;
        background-color: rgb(202, 169, 234);
        text-align: center;
        line-height: 100px;
        margin: auto;


        /* transition-property: all; */
        /* transition-duration: 1s;
        transition-timing-function:ease-in-out; */
        /* transition-delay: 2s; */
        transition: 1s ease-in-out;
      }
      div:hover{
        /* transform: rotateX(60deg); */
        /* transform: scale(2); */
        /* transform: skew(20deg, 50deg); */
        transform: translate(100px,50px);

        /* width: 600px; */
        /* height: 200px; */
      }
    </style>
  </head>
  <body>
    <img src="../Images/land5.jpg" alt="Autum">
    <div>RUBY</div>
  </body>
</html>
