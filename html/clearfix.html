<!DOCTYPE html>
<html>
  <head>
    <title>CSS Float Clearfix</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0"> 
    <style>
      .card{
        border: 3px solid black;
        overflow: auto;
      }
      img{
        width: 250px;
        float: right;
      }
      p{
        padding: 10px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <img src="../Images/land5.jpg" alt="Land">
      <p>Lorem ipsum dolor sit, amet consectetur adipisicing elit. A architecto neque, adipisci soluta tempora est rerum voluptates nihil nesciunt provident nisi omnis nulla error quod illo placeat fuga. Eveniet, necessitatibus.Lorem ipsum dolor sit, amet consectetur adipisicing elit. </p>
    </div>
  </body>
</html>
