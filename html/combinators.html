<!DOCTYPE html>
<html>
  <head>
    <title>CSS Combinators</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <style>
      /* descendant selector */
      .container p{
        background-color: red;
      }

       /* child selector */
       /* .container > p{
        background-color: blue;
       } */

       /* adjacent sibling selector */
       /* .container+p{
        background-color: red;
       } */

       /* general sibling selector */
       /* .container~p{
        background-color: blue;
       } */

       .container p{
        font-size: 50px;
       }
    </style>
  </head>
  <body>
    <div class="container">
      <p class="p1">paragraph - 1</p>
      <p>paragraph - 2</p>
    <div class="card">
      <p>paragraph - 3</p>
    </div>
    </div>
    <p class="p4">paragraph - 4</p>
    <p>paragraph - 5</p>
    <p>paragraph - 6</p>

  </body>
</html>
