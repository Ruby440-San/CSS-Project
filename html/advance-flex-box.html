<!DOCTYPE html>
<html>
  <head>
    <title>CSS Advance Flex-Box</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <style>
      .flex-container{
        width: 840px;
        height: 500px;
        background-color: rgb(189, 149, 189);
        margin: auto;
        /* flex-properties */
        display: flex;
        flex-direction: row;
        flex-wrap: wrap;
        /* justify-content: flex-end; */
        /* align-items: flex-end; */

        /* flex-flow: row wrap; */
        align-content: space-around;
      }
      .flex-container > div{
        width: 200px;
        height: 75px;
        background-color: antiquewhite;
        margin: 3px;
      }
      .box{
        display: flex;
      }
      .box > div{
        width: 300px;
        height: 120px;
        background-color: rgb(77, 77, 225);
        margin: 5px;
        text-align: center;
        line-height: 120px;
      }
    </style>
  </head>
  <body>
    <div class="flex-container">
      <div>1</div>
      <div>2</div>
      <div>3</div>
      <div>4</div>
      <div>5</div>
      <div>6</div>
      <div>7</div>
      <div>8</div>
      <div>9</div>
      <div>10</div>
    </div>
    <hr>
    <div class="box">
      <div>box1</div>
      <div>box2</div>
      <div>box3</div>
      <div>box3</div>
      <div>box3</div>
    </div>
  </body>
</html>
