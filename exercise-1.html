<!DOCTYPE html>
<html>
  <head>
    <title>CSS exercise-1</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">

    <style>
      div{
        width: 100px;
        height: 100px;
        border: 1px solid red;
        margin-bottom: 10px;
      }
      .div1, .div5{
        background-color: red;
        
      }
      .div2, .div4{
        background-color: green;
        margin-left: 50px;
      }
      .div3{
        background-color: blue;
        margin-left: 100px;
      }
    </style>
  </head>
  <body>
    <h1>CSS exercise-1</h1>
  
      <div class="div1"></div>
      <div class="div2"></div>
      <div class="div3"></div>
      <div class="div4"></div>
      <div class="div5"></div>
    
    
  </body>
  
</html>
